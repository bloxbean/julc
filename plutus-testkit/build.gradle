plugins {
    id 'java-library'
}

description = 'Testing framework for unit-testing Plutus validators in JVM'

dependencies {
    api project(':plutus-core')
    api project(':plutus-vm')
    api project(':plutus-compiler')
    api project(':plutus-stdlib')
    api project(':plutus-ledger-api')
    api project(':plutus-onchain-api')
    implementation 'org.bouncycastle:bcprov-jdk18on:1.83'
    testImplementation project(':plutus-vm-scalus')
}
