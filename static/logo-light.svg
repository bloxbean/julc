  <circle cx="200" cy="213" r="108" fill="none" stroke="#1A1A1A" stroke-width="0.8" opacity="0.08"/>

  <circle cx="200" cy="195" r="96" fill="none" stroke="#1A1A1A" stroke-width="2.5" opacity="0.82"/>
