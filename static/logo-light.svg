  <circle cx="200" cy="195" r="82" fill="none" stroke="#1A1A1A" stroke-width="1.2" opacity="0.3"/>

  <!-- Lambda — ACCENT in Yaci blue -->
  <g transform="translate(200,190)" fill="none" stroke="#0565CB" stroke-linecap="round" stroke-linejoin="round">
    <path d="M-8,-18 L0,0 L12,18" stroke-width="4.5" opacity="0.8"/>
