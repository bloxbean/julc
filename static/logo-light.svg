    <text x="-22" y="0" font-family="'JetBrains Mono','SF Mono','Fira Code','Courier New',monospace" font-size="48" font-weight="300" fill="#1A1A1A" opacity="0.35" text-anchor="middle">u</text>
    <text x="18" y="0" font-family="'JetBrains Mono','SF Mono','Fira Code','Courier New',monospace" font-size="48" font-weight="700" fill="#0565CB" text-anchor="middle">L</text>
