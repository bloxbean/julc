name: Native Image (Dev)

on: workflow_dispatch

permissions:
  contents: read

jobs:
  native-image:
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: macos-latest
            label: macos-aarch64
            binary: julc
          - os: ubuntu-latest
            label: linux-x86_64
            binary: julc
          - os: windows-latest
            label: windows-x86_64
            binary: julc.exe

    runs-on: ${{ matrix.os }}
    name: Build CLI ${{ matrix.label }}

    steps:
    - uses: actions/checkout@v4

    - name: Extract version
      id: version
      shell: bash
      run: |
        VERSION=$(grep '^version' gradle.properties | cut -d'=' -f2 | tr -d ' ')
        echo "version=$VERSION" >> "$GITHUB_OUTPUT"

    - name: Set up GraalVM JDK 25
      uses: actions/setup-java@v4
      with:
        java-version: '25'
        distribution: 'graalvm'

    - name: Setup MSVC (Windows only)
      if: runner.os == 'Windows'
      uses: ilammy/msvc-dev-cmd@v1

    - name: Setup Gradle
      uses: gradle/actions/setup-gradle@v4

    - name: Build native image
      run: ./gradlew :julc-cli:nativeCompile -PskipSigning=true --no-daemon
      shell: bash

    - name: Package (Unix)
      if: runner.os != 'Windows'
      shell: bash
      run: |
        VERSION="${{ steps.version.outputs.version }}"
        STAGING="julc-${VERSION}-${{ matrix.label }}"
        mkdir -p "$STAGING"
        cp julc-cli/build/native/nativeCompile/${{ matrix.binary }} "$STAGING/"
        cp julc-cli/README.md "$STAGING/"
        zip -r "julc-${VERSION}-${{ matrix.label }}.zip" "$STAGING"

    - name: Package (Windows)
      if: runner.os == 'Windows'
      shell: pwsh
      run: |
        $VERSION = "${{ steps.version.outputs.version }}"
        $STAGING = "julc-${VERSION}-${{ matrix.label }}"
        New-Item -ItemType Directory -Path $STAGING -Force
        Copy-Item "julc-cli/build/native/nativeCompile/${{ matrix.binary }}" -Destination $STAGING
        Copy-Item "julc-cli/README.md" -Destination $STAGING
        Compress-Archive -Path $STAGING -DestinationPath "julc-${VERSION}-${{ matrix.label }}.zip"

    - name: Upload artifact
      uses: actions/upload-artifact@v4
      with:
        name: julc-${{ steps.version.outputs.version }}-${{ matrix.label }}
        path: julc-${{ steps.version.outputs.version }}-${{ matrix.label }}.zip
        retention-days: 3

  native-image-playground:
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: macos-latest
            label: macos-aarch64
            binary: julc-playground
          - os: ubuntu-latest
            label: linux-x86_64
            binary: julc-playground
          - os: windows-latest
            label: windows-x86_64
            binary: julc-playground.exe

    runs-on: ${{ matrix.os }}
    name: Build Playground ${{ matrix.label }}

    steps:
    - uses: actions/checkout@v4

    - name: Extract version
      id: version
      shell: bash
      run: |
        VERSION=$(grep '^version' gradle.properties | cut -d'=' -f2 | tr -d ' ')
        echo "version=$VERSION" >> "$GITHUB_OUTPUT"

    - name: Set up GraalVM JDK 25
      uses: actions/setup-java@v4
      with:
        java-version: '25'
        distribution: 'graalvm'

    - name: Setup Node.js
      uses: actions/setup-node@v4
      with:
        node-version: '20'

    - name: Setup MSVC (Windows only)
      if: runner.os == 'Windows'
      uses: ilammy/msvc-dev-cmd@v1

    - name: Setup Gradle
      uses: gradle/actions/setup-gradle@v4

    - name: Build native image
      run: ./gradlew :julc-playground:nativeCompile -PwithFrontend -PskipSigning=true --no-daemon
      shell: bash

    - name: Package (Unix)
      if: runner.os != 'Windows'
      shell: bash
      run: |
        VERSION="${{ steps.version.outputs.version }}"
        STAGING="julc-playground-${VERSION}-${{ matrix.label }}"
        mkdir -p "$STAGING"
        cp julc-playground/build/native/nativeCompile/${{ matrix.binary }} "$STAGING/"
        cp julc-playground/README.md "$STAGING/"
        zip -r "julc-playground-${VERSION}-${{ matrix.label }}.zip" "$STAGING"

    - name: Package (Windows)
      if: runner.os == 'Windows'
      shell: pwsh
      run: |
        $VERSION = "${{ steps.version.outputs.version }}"
        $STAGING = "julc-playground-${VERSION}-${{ matrix.label }}"
        New-Item -ItemType Directory -Path $STAGING -Force
        Copy-Item "julc-playground/build/native/nativeCompile/${{ matrix.binary }}" -Destination $STAGING
        Copy-Item "julc-playground/README.md" -Destination $STAGING
        Compress-Archive -Path $STAGING -DestinationPath "julc-playground-${VERSION}-${{ matrix.label }}.zip"

    - name: Upload artifact
      uses: actions/upload-artifact@v4
      with:
        name: julc-playground-${{ steps.version.outputs.version }}-${{ matrix.label }}
        path: julc-playground-${{ steps.version.outputs.version }}-${{ matrix.label }}.zip
        retention-days: 3
